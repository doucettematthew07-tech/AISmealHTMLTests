<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI in Actuarial Science Module</title>
  <style>
    :root {
      --aiam-bg: #f5f7fb;
      --aiam-card: #ffffff;
      --aiam-surface: #f2f5fa;
      --aiam-border: #d5dfeb;
      --aiam-primary: #1f3e66;
      --aiam-text: #12263f;
      --aiam-text-muted: #4f6177;
      --aiam-focus: #0c5bbf;
      --aiam-shell-height: clamp(640px, 78vh, 920px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--aiam-bg);
      color: var(--aiam-text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      padding: 0;
    }

    .aiam-shell {
      width: 100%;
      max-width: 1460px;
      min-height: 100vh;
      height: var(--aiam-shell-height);
      margin: 0 auto;
      padding: 18px;
    }

    .aiam-module {
      width: 100%;
      height: 100%;
      border: 1px solid var(--aiam-border);
      border-radius: 18px;
      background: var(--aiam-card);
      box-shadow: 0 10px 28px rgba(18, 38, 63, 0.07);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(290px, 350px) minmax(0, 1fr);
    }

    .aiam-nav {
      min-height: 0;
      padding: 22px 18px 20px;
      background: var(--aiam-surface);
      border-right: 1px solid var(--aiam-border);
      overflow: auto;
    }

    .aiam-nav-group + .aiam-nav-group {
      margin-top: 10px;
    }

    .aiam-section-btn {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--aiam-text);
      text-align: left;
      padding: 15px 16px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .aiam-section-btn:hover {
      background: #e4ebf5;
      border-color: #c7d4e6;
    }

    .aiam-section-btn:focus-visible,
    .aiam-concept-btn:focus-visible {
      outline: 3px solid rgba(12, 91, 191, 0.28);
      outline-offset: 1px;
      border-color: var(--aiam-focus);
    }

    .aiam-section-btn[aria-expanded="true"] {
      background: var(--aiam-primary);
      color: #ffffff;
      border-color: var(--aiam-primary);
    }

    .aiam-caret {
      width: 12px;
      height: 12px;
      transform: rotate(0deg);
      transition: transform 180ms ease;
      flex-shrink: 0;
    }

    .aiam-section-btn[aria-expanded="true"] .aiam-caret {
      transform: rotate(90deg);
    }

    .aiam-concepts {
      margin-top: 6px;
      margin-left: 12px;
      padding-left: 16px;
      border-left: 1px solid #d5deeb;
      display: grid;
      gap: 6px;
    }

    .aiam-concept-btn {
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--aiam-text-muted);
      text-align: left;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 500;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .aiam-concept-btn:hover {
      color: var(--aiam-text);
      background: #e7edf6;
      border-color: #cad7e8;
    }

    .aiam-concept-btn[aria-pressed="true"] {
      background: #dfe8f5;
      color: #163b63;
      border-color: #bccbe0;
      font-weight: 650;
    }

    .aiam-reading {
      padding: 22px 28px 18px 22px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      gap: 10px;
      justify-items: stretch;
      align-content: start;
    }

    .aiam-reading > * {
      max-width: 960px;
      width: 100%;
    }

    .aiam-section-kicker {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      color: #5b6a7a;
    }

    .aiam-title {
      margin: 0;
      font-size: clamp(30px, 3vw, 44px);
      line-height: 1.12;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--aiam-text);
    }

    .aiam-divider {
      width: 72px;
      height: 3px;
      background: var(--aiam-primary);
      border-radius: 999px;
      margin-top: 10px;
    }

    .aiam-paragraphs {
      min-height: 0;
      overflow: auto;
      padding-right: 8px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .aiam-paragraphs p {
      margin: 0;
      font-size: 16px;
      line-height: 1.7;
      color: var(--aiam-text-muted);
    }

    .aiam-visual {
      width: 50%;
      margin: 2px auto 6px;
      border: 1px solid #cbd7e7;
      border-radius: 14px;
      overflow: hidden;
      background: #eef3fa;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .aiam-visual-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .aiam-visual-caption {
      margin: 0;
      padding: 8px 12px;
      border-top: 1px solid #d6e0ee;
      background: #f7f9fd;
      color: #5b6a7c;
      font-size: 12px;
      line-height: 1.45;
    }

    .aiam-points {
      border: 1px solid #cbd7e7;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
      border-radius: 14px;
      padding: 14px 16px;
      align-self: end;
    }

    .aiam-points-title {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--aiam-text-muted);
    }

    .aiam-points-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .aiam-points-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: start;
      gap: 12px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--aiam-text);
    }

    .aiam-dot {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #dbe6f5;
      color: #1a3f6a;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      display: grid;
      place-items: center;
      margin-top: 1px;
    }

    .aiam-sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      .aiam-shell { padding: 14px; }
      .aiam-module { grid-template-columns: minmax(280px, 320px) minmax(0, 1fr); }
      .aiam-reading { padding: 18px 20px 16px 18px; }
      .aiam-reading > * { max-width: 860px; }
    }

    @media (max-width: 920px) {
      .aiam-shell {
        min-height: 0;
        height: auto;
        padding: 12px;
      }

      .aiam-module {
        min-height: 0;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(320px, auto) minmax(0, 1fr);
      }

      .aiam-nav {
        border-right: 0;
        border-bottom: 1px solid var(--aiam-border);
      }

      .aiam-reading { padding: 18px 16px 16px; }
      .aiam-reading > * { max-width: none; }
      .aiam-title { font-size: 28px; }
      .aiam-visual { width: 72%; }
    }

    @media (max-width: 640px) {
      .aiam-shell { padding: 8px; }
      .aiam-module { border-radius: 14px; }
      .aiam-nav { padding: 16px 12px 14px; }
      .aiam-reading { padding: 16px 12px 14px; }
      .aiam-paragraphs p,
      .aiam-points-list li { font-size: 15px; }
      .aiam-visual { width: 100%; margin: 2px 0 6px; }
      .aiam-visual-caption { padding: 7px 10px; font-size: 11px; }
    }
  </style>
</head>

      </article>
    </section>
  </main>

      lifeTables: "https://commons.wikimedia.org/wiki/Special:FilePath/%22Life%20tables%22%2C%20William%20Farr%20Wellcome%20L0016432.jpg",
      riskMatrixSimple: "https://commons.wikimedia.org/wiki/Special:FilePath/Risk%20Matrix%20Simple.jpg",
      riskMatrixPareto: "https://commons.wikimedia.org/wiki/Special:FilePath/Risk%20matrix%20-%20Pareto%20Distribution.jpg",
      kaplanMeierAml: "https://commons.wikimedia.org/wiki/Special:FilePath/Kaplan-Meier%20curve%20for%20aml%20with%20confidence%20bounds.svg",
      kaplanMeierMortality: "https://commons.wikimedia.org/wiki/Special:FilePath/Kaplan-Meier%20curve%20mortality.jpg",
      normalPdf: "https://commons.wikimedia.org/wiki/Special:FilePath/Normal%20distribution%20pdf.svg",
      normalPdfMulti: "https://commons.wikimedia.org/wiki/Special:FilePath/Normal%20Distribution%20PDF.svg",
      glmGeometry: "https://commons.wikimedia.org/wiki/Special:FilePath/General%20Cylinder.PNG",
      actuarial2: "https://commons.wikimedia.org/wiki/Special:FilePath/Actuarial2.jpg",
      actuarial3: "https://commons.wikimedia.org/wiki/Special:FilePath/Actuarial3.jpg"
    };

    const conceptVisuals = {
      "uncertain-future-outcomes": {
        src: visualLibrary.actuarialNotation,
        alt: "Actuarial notation diagram used in risk and uncertainty modeling.",
        caption: "Actuarial AI conversations begin within formal risk notation and uncertainty frameworks."
      },
      "pricing-reserves-liabilities": {
        src: visualLibrary.annuitiesNotation,
        alt: "Annuities actuarial notation diagram relevant to reserves and long-term liabilities.",
        caption: "Pricing and reserve analysis often links to long-horizon actuarial notation and cashflow timing."
      },
      "claims-patterns-and-trends": {
        src: visualLibrary.kaplanMeierMortality,
        alt: "Kaplan-Meier style survival or mortality curve showing trend behavior over time.",
        caption: "Claims and trend review frequently uses time-to-event and survival-style evidence."
      },
      "scale-and-model-consistency": {
        src: visualLibrary.cumulativeCashflow,
        alt: "Cumulative cashflow diagram related to actuarial and financial risk projection.",
        caption: "As scale grows, consistency across model outputs and projections becomes critical."
      },
      "handle-large-granular-data": {
        src: visualLibrary.normalPdf,
        alt: "Normal distribution probability density function chart used in modeling.",
        caption: "Handling high-volume granular data still depends on disciplined statistical structure."
      },
      "scenario-and-sensitivity-testing": {
        src: visualLibrary.normalPdfMulti,
        alt: "Multiple normal distribution curves used to compare scenario assumptions.",
        caption: "Scenario and sensitivity testing compares how assumption sets shift projected outcomes."
      },
      "model-comparison-and-calibration": {
        src: visualLibrary.glmGeometry,
        alt: "Generalized model geometry graphic relevant to model structure comparison.",
        caption: "Calibration and model comparison require consistent structure and fit evaluation."
      },
      "pattern-review-support": {
        src: visualLibrary.riskMatrixPareto,
        alt: "Risk matrix with Pareto distribution emphasizing concentration of severe risks.",
        caption: "AI often supports pattern triage so actuaries can prioritize higher-impact review points."
      },
      "assumptions-still-drive-results": {
        src: visualLibrary.mortalityTable,
        alt: "Historical mortality table illustrating assumption-driven actuarial outcomes.",
        caption: "Assumptions remain foundational drivers of actuarial results, with or without AI."
      },
      "complexity-vs-interpretability": {
        src: visualLibrary.actuarial3,
        alt: "Actuarial science visual emphasizing tradeoffs between complexity and clarity.",
        caption: "More complexity can lose interpretability if governance and explanation are weak."
      },
      "historical-data-shift-risk": {
        src: visualLibrary.survivalActuarial,
        alt: "Actuarial survival curve showing how experience patterns may shift over time.",
        caption: "Historical patterns can shift, so model behavior must be monitored under changing conditions."
      },
      "governance-and-validation-required": {
        src: visualLibrary.riskMatrixSimple,
        alt: "Simple risk matrix diagram used in governance and control contexts.",
        caption: "Validation and governance controls are mandatory in actuarial AI workflows."
      },
      "uncertainty-first-mindset": {
        src: visualLibrary.kaplanMeierAml,
        alt: "Kaplan-Meier curve with confidence bounds representing uncertainty analysis.",
        caption: "Uncertainty-first thinking means evaluating ranges and confidence, not single-point certainty."
      },
      "control-and-model-risk": {
        src: visualLibrary.riskMatrixSimple,
        alt: "Risk matrix emphasizing control discipline and model risk categorization.",
        caption: "Model risk discipline requires explicit control frameworks for monitoring and escalation."
      },
      "transparency-and-defensibility": {
        src: visualLibrary.lifeTables,
        alt: "Historical life tables publication image emphasizing traceability and defensibility.",
        caption: "Transparent documentation and defensible logic are core actuarial expectations."
      },
      "human-judgment-accountability": {
        src: visualLibrary.actuarial2,
        alt: "Actuarial science image representing human judgment and professional accountability.",
        caption: "Final accountability remains with actuaries, not with automated tools."
      }
    };

    const state = {
      activeSectionId: moduleData.sections[0].id,
      activeConceptId: moduleData.sections[0].concepts[0].id
    };

    const navRoot = document.getElementById("aiam-nav");
    const sectionKickerEl = document.getElementById("aiam-section-kicker");
    const titleEl = document.getElementById("aiam-title");
    const visualEl = document.getElementById("aiam-visual");
    const visualImgEl = document.getElementById("aiam-visual-img");
    const visualCaptionEl = document.getElementById("aiam-visual-caption");
    const paragraphsEl = document.getElementById("aiam-paragraphs");
    const pointsEl = document.getElementById("aiam-points");

    function getSection(sectionId) {
      return moduleData.sections.find((section) => section.id === sectionId) || moduleData.sections[0];
    }

    function getConcept(section, conceptId) {
      return section.concepts.find((concept) => concept.id === conceptId) || section.concepts[0];
    }

    function setActiveSection(sectionId) {
      if (state.activeSectionId === sectionId) return;
      const section = getSection(sectionId);
      state.activeSectionId = section.id;
      state.activeConceptId = section.concepts[0].id;
      render();
    }

    function setActiveConcept(sectionId, conceptId) {
      state.activeSectionId = sectionId;
      state.activeConceptId = conceptId;
      render();
    }

    function renderNavigation() {
      navRoot.innerHTML = "";

      moduleData.sections.forEach((section) => {
        const isExpanded = section.id === state.activeSectionId;
        const group = document.createElement("div");
        group.className = "aiam-nav-group";

        const sectionButton = document.createElement("button");
        sectionButton.type = "button";
        sectionButton.className = "aiam-section-btn";
        sectionButton.setAttribute("aria-expanded", String(isExpanded));
        sectionButton.setAttribute("aria-controls", `aiam-concepts-${section.id}`);
        sectionButton.innerHTML = `<span class="aiam-caret" aria-hidden="true">&#9656;</span><span>${section.title}</span>`;
        sectionButton.addEventListener("click", () => setActiveSection(section.id));
        group.appendChild(sectionButton);

        if (isExpanded) {
          const conceptsWrap = document.createElement("div");
          conceptsWrap.className = "aiam-concepts";
          conceptsWrap.id = `aiam-concepts-${section.id}`;

          section.concepts.forEach((concept) => {
            const conceptButton = document.createElement("button");
            const isActive = concept.id === state.activeConceptId;
            conceptButton.type = "button";
            conceptButton.className = "aiam-concept-btn";
            conceptButton.textContent = concept.title;
            conceptButton.setAttribute("aria-pressed", String(isActive));
            conceptButton.addEventListener("click", () => setActiveConcept(section.id, concept.id));
            conceptsWrap.appendChild(conceptButton);
          });

          group.appendChild(conceptsWrap);
        }

        navRoot.appendChild(group);
      });
    }

    function renderReadingPanel() {
      const section = getSection(state.activeSectionId);
      const concept = getConcept(section, state.activeConceptId);

      sectionKickerEl.textContent = section.title;
      titleEl.textContent = concept.title;

      paragraphsEl.innerHTML = "";
      concept.paragraphs.forEach((paragraphText) => {
        const p = document.createElement("p");
        p.textContent = paragraphText;
        paragraphsEl.appendChild(p);
      });

      const visual = conceptVisuals[concept.id] || {
        src: visualLibrary.actuarialNotation,
        alt: "Actuarial analysis visual.",
        caption: "General actuarial analysis context."
      };
      visualImgEl.src = visual.src;
      visualImgEl.alt = visual.alt;
      visualCaptionEl.textContent = visual.caption;
      visualEl.hidden = false;

      pointsEl.innerHTML = "";
      concept.keyPoints.forEach((point, index) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="aiam-dot" aria-hidden="true">${index + 1}</span><span>${point}</span>`;
        pointsEl.appendChild(li);
      });
    }

    function render() {
      renderNavigation();
      renderReadingPanel();
    }

    render();
  </script>
</body>
</html>
