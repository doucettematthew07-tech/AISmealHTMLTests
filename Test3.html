<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI in Accounting Module</title>
  <style>
    :root {
      --aiam-bg: #f5f7fb;
      --aiam-card: #ffffff;
      --aiam-surface: #f2f5fa;
      --aiam-border: #d5dfeb;
      --aiam-primary: #1f3e66;
      --aiam-primary-deep: #18324f;
      --aiam-primary-soft: #e8eef7;
      --aiam-text: #12263f;
      --aiam-text-muted: #4f6177;
      --aiam-focus: #0c5bbf;
      --aiam-shell-height: clamp(640px, 78vh, 920px);
      --aiam-shell-height-mobile: auto;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--aiam-bg);
      color: var(--aiam-text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      padding: 0;
    }

    .aiam-shell {
      width: 100%;
      max-width: 1460px;
      min-height: 100vh;
      height: var(--aiam-shell-height);
      margin: 0 auto;
      padding: 18px;
    }

    .aiam-module {
      width: 100%;
      height: 100%;
      min-height: 100%;
      border: 1px solid var(--aiam-border);
      border-radius: 18px;
      background: var(--aiam-card);
      box-shadow: 0 10px 28px rgba(18, 38, 63, 0.07);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(290px, 350px) minmax(0, 1fr);
    }

    .aiam-nav {
      min-height: 0;
      padding: 22px 18px 20px;
      background: var(--aiam-surface);
      border-right: 1px solid var(--aiam-border);
      overflow: auto;
    }

    .aiam-nav-group + .aiam-nav-group {
      margin-top: 10px;
    }

    .aiam-section-btn {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--aiam-text);
      text-align: left;
      padding: 15px 16px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .aiam-section-btn:hover {
      background: #e4ebf5;
      border-color: #c7d4e6;
    }

    .aiam-section-btn:focus-visible,
    .aiam-concept-btn:focus-visible {
      outline: 3px solid rgba(12, 91, 191, 0.28);
      outline-offset: 1px;
      border-color: var(--aiam-focus);
    }

    .aiam-section-btn[aria-expanded="true"] {
      background: var(--aiam-primary);
      color: #ffffff;
      border-color: var(--aiam-primary);
    }

    .aiam-caret {
      width: 12px;
      height: 12px;
      transform: rotate(0deg);
      transition: transform 180ms ease;
      flex-shrink: 0;
    }

    .aiam-section-btn[aria-expanded="true"] .aiam-caret {
      transform: rotate(90deg);
    }

    .aiam-concepts {
      margin-top: 6px;
      margin-left: 12px;
      padding-left: 16px;
      border-left: 1px solid #d5deeb;
      display: grid;
      gap: 6px;
    }

    .aiam-concept-btn {
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--aiam-text-muted);
      text-align: left;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 500;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .aiam-concept-btn:hover {
      color: var(--aiam-text);
      background: #e7edf6;
      border-color: #cad7e8;
    }

    .aiam-concept-btn[aria-pressed="true"] {
      background: #dfe8f5;
      color: #163b63;
      border-color: #bccbe0;
      font-weight: 650;
    }

    .aiam-reading {
      padding: 22px 28px 18px 22px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      gap: 10px;
      justify-items: stretch;
      align-content: start;
    }

    .aiam-reading > * {
      max-width: 960px;
      width: 100%;
    }

    .aiam-section-kicker {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      color: #5b6a7a;
    }

    .aiam-title {
      margin: 0;
      font-size: clamp(30px, 3vw, 44px);
      line-height: 1.12;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--aiam-text);
    }

    .aiam-divider {
      width: 72px;
      height: 3px;
      background: var(--aiam-primary);
      border-radius: 999px;
      margin-top: 10px;
    }

    .aiam-visual {
      margin: 2px 0 6px;
      border: 1px solid #cbd7e7;
      border-radius: 14px;
      overflow: hidden;
      background: #eef3fa;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .aiam-visual-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .aiam-visual-caption {
      margin: 0;
      padding: 8px 12px;
      border-top: 1px solid #d6e0ee;
      background: #f7f9fd;
      color: #5b6a7c;
      font-size: 12px;
      line-height: 1.45;
    }

    .aiam-paragraphs {
      min-height: 0;
      overflow: auto;
      padding-right: 8px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .aiam-paragraphs p {
      margin: 0;
      font-size: 16px;
      line-height: 1.7;
      color: var(--aiam-text-muted);
    }

    .aiam-points {
      border: 1px solid #cbd7e7;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
      border-radius: 14px;
      padding: 14px 16px;
      align-self: end;
    }

    .aiam-points-title {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--aiam-text-muted);
    }

    .aiam-points-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .aiam-points-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: start;
      gap: 12px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--aiam-text);
    }

    .aiam-dot {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #dbe6f5;
      color: #1a3f6a;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      display: grid;
      place-items: center;
      margin-top: 1px;
    }

    .aiam-sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      .aiam-shell {
        padding: 14px;
      }

      .aiam-module {
        grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
      }

      .aiam-reading {
        padding: 18px 20px 16px 18px;
      }

      .aiam-reading > * {
        max-width: 860px;
      }
    }

    @media (max-width: 920px) {
      .aiam-shell {
        min-height: 0;
        height: auto;
        padding: 12px;
      }

      .aiam-module {
        min-height: 0;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(320px, auto) minmax(0, 1fr);
      }

      .aiam-nav {
        border-right: 0;
        border-bottom: 1px solid var(--aiam-border);
      }

      .aiam-reading {
        padding: 18px 16px 16px;
      }

      .aiam-reading > * {
        max-width: none;
      }

      .aiam-title {
        font-size: 28px;
      }
    }

    @media (max-width: 640px) {
      .aiam-shell {
        padding: 8px;
      }

      .aiam-module {
        border-radius: 14px;
      }

      .aiam-nav {
        padding: 16px 12px 14px;
      }

      .aiam-reading {
        padding: 16px 12px 14px;
      }

      .aiam-paragraphs p,
      .aiam-points-list li {
        font-size: 15px;
      }

      .aiam-visual-caption {
        padding: 7px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>

    <h1 class="aiam-sr-only">AI in Accounting learning module</h1>

        </section>
      </article>
    </section>
  </main>

        },
        {

    };

    const state = {
      activeSectionId: moduleData.sections[0].id,
      activeConceptId: moduleData.sections[0].concepts[0].id
    };

    const visualLibrary = {
      dashboard: "https://commons.wikimedia.org/wiki/Special:FilePath/Laptop%20with%20many%20charts%20on%20screen%20on%20cluttered%20desk.jpg",
      analystLaptop: "https://commons.wikimedia.org/wiki/Special:FilePath/Man%20at%20a%20laptop%20in%20an%20office%20%28Unsplash%29.jpg",
      homeOffice: "https://commons.wikimedia.org/wiki/Special:FilePath/Home%20office%20%282%29.jpg",
      officeSupplies: "https://commons.wikimedia.org/wiki/Special:FilePath/Office%20supplies%20and%20coffee%20%28Unsplash%20xxeAftHHq6E%29.jpg",
      conferenceRoom: "https://commons.wikimedia.org/wiki/Special:FilePath/Chairs-2181923.jpg",
      meetingTable: "https://commons.wikimedia.org/wiki/Special:FilePath/Meeting%20Table.png",
      cybersecurity: "https://commons.wikimedia.org/wiki/Special:FilePath/Cybersecurity.png",
      officePeople: "https://commons.wikimedia.org/wiki/Special:FilePath/Bench%20Accounting%202015-11-30%20%28Unsplash%20unG80SBSfMU%29.jpg",
      officeDesk: "https://commons.wikimedia.org/wiki/Special:FilePath/Bench%20Accounting%202015-12-04%20%28Unsplash%29.jpg",
      checklist: "https://commons.wikimedia.org/wiki/Special:FilePath/Checklist-icon.svg"
    };

    const conceptVisuals = {
      "high-volume-review-contexts": {
        src: visualLibrary.dashboard,
        alt: "Laptop dashboard with multiple charts representing high-volume transaction screening.",
        caption: "Population-scale analytics help reviewers identify unusual transactions quickly."
      },
      "auditing-and-assurance-workflows": {
        src: visualLibrary.meetingTable,
        alt: "Conference table setup representing collaborative audit planning and assurance workflows.",
        caption: "Audit and assurance work relies on coordinated planning and risk-focused review."
      },
      "financial-reporting-and-reconciliation": {
        src: visualLibrary.homeOffice,
        alt: "Laptop workspace used to compare reports and reconcile account balances.",
        caption: "Reporting and reconciliation involve repeated cross-checks across records."
      },
      "tax-compliance-and-internal-controls": {
        src: visualLibrary.cybersecurity,
        alt: "Padlock over digital circuitry symbolizing compliance rules and internal controls.",
        caption: "Compliance checks and control monitoring depend on structured safeguards."
      },
      "classroom-scale-vs-practice-scale": {
        src: visualLibrary.officeDesk,
        alt: "Real-world office desk setup representing practical accounting work at larger scale.",
        caption: "Practice environments are broader and messier than classroom-scale exercises."
      },
      "routine-check-automation": {
        src: visualLibrary.analystLaptop,
        alt: "Analyst at a laptop representing automated routine checks with human follow-up.",
        caption: "Automation handles repetitive screening so accountants can focus on exceptions."
      },
      "consistency-across-records": {
        src: visualLibrary.officeSupplies,
        alt: "Organized office supplies symbolizing standardized and consistent accounting review processes.",
        caption: "Consistency improves when the same review logic is applied across systems."
      },
      "broader-transaction-coverage": {
        src: visualLibrary.dashboard,
        alt: "Analytics dashboard showing broad data coverage across many transactions.",
        caption: "Wider coverage helps surface anomalies that small samples can miss."
      },
      "risk-focused-review-prioritization": {
        src: visualLibrary.officePeople,
        alt: "Accounting professionals collaborating to prioritize high-risk review items.",
        caption: "Risk-based triage directs attention to items with higher reporting impact."
      },
      "organizing-exceptions-for-follow-up": {
        src: visualLibrary.checklist,
        alt: "Checklist icon representing structured exception routing and follow-up tracking.",
        caption: "Exception workflows are strongest when issues are assigned, tracked, and closed."
      },
      "professional-judgment-cannot-be-replaced": {
        src: visualLibrary.conferenceRoom,
        alt: "Conference room scene symbolizing human discussion and professional judgment.",
        caption: "Final accounting conclusions still require accountable human judgment."
      },
      "output-is-not-automatically-objective": {
        src: visualLibrary.dashboard,
        alt: "Chart-heavy screen symbolizing data-driven outputs that still require validation.",
        caption: "Output quality depends on input data, assumptions, and review discipline."
      },
      "standards-changes-require-human-interpretation": {
        src: visualLibrary.meetingTable,
        alt: "Meeting space representing ongoing interpretation of changing accounting standards.",
        caption: "When standards change, review logic must be reinterpreted and updated."
      },
      "ai-is-not-a-standalone-solution": {
        src: visualLibrary.cybersecurity,
        alt: "Digital lock image representing governance and controlled accounting workflows.",
        caption: "AI is useful only when embedded inside governed accounting processes."
      },
      "accuracy-and-consistency-expectations": {
        src: visualLibrary.officeSupplies,
        alt: "Neatly arranged desk tools representing precision, consistency, and control.",
        caption: "Accuracy and consistency are the baseline for reliable reporting."
      },
      "documentation-and-clear-reasoning": {
        src: visualLibrary.checklist,
        alt: "Checklist visual representing documentation and clear audit trail reasoning.",
        caption: "Clear documentation turns analysis into defensible accounting conclusions."
      },
      "oversight-and-accountability-stay-human": {
        src: visualLibrary.conferenceRoom,
        alt: "Conference room with review setting representing human oversight and accountability.",
        caption: "Responsibility, escalation, and sign-off remain human obligations."
      },
      "ai-as-support-within-existing-systems": {
        src: visualLibrary.analystLaptop,
        alt: "Professional using a laptop to support existing accounting workflows with AI tools.",
        caption: "AI works best as support inside established systems, not as a replacement."
      }
    };

    const navRoot = document.getElementById("aiam-nav");
    const sectionKickerEl = document.getElementById("aiam-section-kicker");
    const titleEl = document.getElementById("aiam-title");
    const visualEl = document.getElementById("aiam-visual");
    const visualImgEl = document.getElementById("aiam-visual-img");
    const visualCaptionEl = document.getElementById("aiam-visual-caption");
    const paragraphsEl = document.getElementById("aiam-paragraphs");
    const pointsEl = document.getElementById("aiam-points");

    function getSection(sectionId) {
      return moduleData.sections.find((section) => section.id === sectionId) || moduleData.sections[0];
    }

    function getConcept(section, conceptId) {
      return section.concepts.find((concept) => concept.id === conceptId) || section.concepts[0];
    }

    function setActiveSection(sectionId) {
      if (state.activeSectionId === sectionId) return;
      const section = getSection(sectionId);
      state.activeSectionId = section.id;
      state.activeConceptId = section.concepts[0].id;
      render();
    }

    function setActiveConcept(sectionId, conceptId) {
      state.activeSectionId = sectionId;
      state.activeConceptId = conceptId;
      render();
    }

    function renderNavigation() {
      navRoot.innerHTML = "";

      moduleData.sections.forEach((section) => {
        const isExpanded = section.id === state.activeSectionId;
        const group = document.createElement("div");
        group.className = "aiam-nav-group";

        const sectionButton = document.createElement("button");
        sectionButton.type = "button";
        sectionButton.className = "aiam-section-btn";
        sectionButton.setAttribute("aria-expanded", String(isExpanded));
        sectionButton.setAttribute("aria-controls", `aiam-concepts-${section.id}`);
        sectionButton.innerHTML = `<span class="aiam-caret" aria-hidden="true">&#9656;</span><span>${section.title}</span>`;
        sectionButton.addEventListener("click", () => setActiveSection(section.id));

        group.appendChild(sectionButton);

        if (isExpanded) {
          const conceptsWrap = document.createElement("div");
          conceptsWrap.className = "aiam-concepts";
          conceptsWrap.id = `aiam-concepts-${section.id}`;

          section.concepts.forEach((concept) => {
            const conceptButton = document.createElement("button");
            const isActive = concept.id === state.activeConceptId;
            conceptButton.type = "button";
            conceptButton.className = "aiam-concept-btn";
            conceptButton.textContent = concept.title;
            conceptButton.setAttribute("aria-pressed", String(isActive));
            conceptButton.addEventListener("click", () => {
              setActiveConcept(section.id, concept.id);
            });
            conceptsWrap.appendChild(conceptButton);
          });

          group.appendChild(conceptsWrap);
        }

        navRoot.appendChild(group);
      });
    }

    function renderReadingPanel() {
      const section = getSection(state.activeSectionId);
      const concept = getConcept(section, state.activeConceptId);

      sectionKickerEl.textContent = section.title;
      titleEl.textContent = concept.title;

      const visual = conceptVisuals[concept.id];
      if (visual) {
        visualImgEl.src = visual.src;
        visualImgEl.alt = visual.alt;
        visualCaptionEl.textContent = visual.caption;
        visualEl.hidden = false;
      } else {
        visualImgEl.removeAttribute("src");
        visualImgEl.alt = "";
        visualCaptionEl.textContent = "";
        visualEl.hidden = true;
      }

      paragraphsEl.innerHTML = "";
      concept.paragraphs.forEach((paragraphText) => {
        const p = document.createElement("p");
        p.textContent = paragraphText;
        paragraphsEl.appendChild(p);
      });

      pointsEl.innerHTML = "";
      concept.keyPoints.forEach((point, index) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="aiam-dot" aria-hidden="true">${index + 1}</span><span>${point}</span>`;
        pointsEl.appendChild(li);
      });
    }

    function render() {
      renderNavigation();
      renderReadingPanel();
    }

    render();
  </script>
</body>
